<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SchoolHub</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Auth Logic -->
    <script src="auth.js"></script>
    <script>
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            Auth.redirectIfLoggedIn();
        });
    </script>
</head>
<body class="auth-page">
    <div class="auth-container glass-effect">
        <div class="auth-card fade-in-up">
            <div class="auth-header">
                <h2><i class="fa-solid fa-graduation-cap"></i> SchoolHub</h2>
                <p>Sign in to access the Q&A system</p>
            </div>
            
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-with-icon">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="username" placeholder="Enter your username" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <div id="error-msg" class="auth-error-msg hidden"></div>

                <button type="submit" class="primary-btn w-100">Sign In <i class="fa-solid fa-arrow-right"></i></button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </div>

    <!-- Theme Context -->
    <script>
        if (localStorage.getItem('schoolhub_theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
    <script>
        // Form Logic
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.classList.add('hidden');
            
            const result = Auth.login(username, password);
            if (result.success) {
                if (result.role === Auth.ROLES.ADMIN) {
                    window.location.replace('admin.html');
                } else {
                    window.location.replace('index.html');
                }
            } else {
                errorMsg.innerText = result.message;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
