<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SchoolHub</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Auth Logic -->
    <script src="auth.js"></script>
    <script>
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            Auth.redirectIfLoggedIn();
        });
    </script>
</head>

<body class="auth-page">
    <div class="auth-container glass-effect">
        <div class="auth-card fade-in-up">
            <div class="auth-header">
                <h2><i class="fa-solid fa-graduation-cap"></i> SchoolHub</h2>
                <p>Create a new account</p>
            </div>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-with-icon">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="username" placeholder="Choose a username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Choose a password" required>
                    </div>
                </div>

                <div id="error-msg" class="auth-error-msg hidden"></div>

                <button type="submit" class="primary-btn w-100">Create Account <i
                        class="fa-solid fa-user-plus"></i></button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign in here</a></p>
            </div>
        </div>
    </div>

    <!-- Theme Context -->
    <script>
        if (localStorage.getItem('schoolhub_theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
    <script>
        // Form Logic
        document.getElementById('register-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');

            let role = 'Student'; // Default
            document.getElementsByName('role').forEach(r => {
                if (r.checked) role = r.value;
            });

            errorMsg.classList.add('hidden');

            if (Auth.ROLES[role.toUpperCase()] === undefined) {
                errorMsg.innerText = 'Invalid Role selected.';
                errorMsg.classList.remove('hidden');
                return;
            }

            const result = Auth.register(username, password, role);
            if (result.success) {
                if (role === Auth.ROLES.ADMIN) {
                    window.location.replace('admin.html');
                } else {
                    window.location.replace('index.html');
                }
            } else {
                errorMsg.innerText = result.message;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
